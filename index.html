<!DOCTYPE html>
<html>
<head>
<title>My Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* Chat area */
#messages {
  height: 85vh;
  overflow-y: scroll;
  padding: 10px;
  background: #f0f0f0;
}

/* Bottom input bar */
#inputBar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
  padding: 5px;
}

/* Username (small) */
#username {
  width: 25%;
  padding: 8px;
  font-size: 12px;
}

/* Message input (big) */
#msg {
  width: 55%;
  padding: 10px;
  font-size: 16px;
}

/* Send button */
button {
  width: 20%;
  font-size: 16px;
}
</style>

</head>

<body>

<h3 style="text-align:center;">Chat</h3>

<div id="messages"></div>

<div id="inputBar">
  <input id="username" placeholder="Name">
  <input id="msg" placeholder="Message">
  <button onclick="send()">Send</button>
</div>

<script>

const supabaseUrl = "https://mwogkqpseyajukoczujs.supabase.co";
const supabaseKey = "sb_publishable_xXJ29epOc0VbpKhDWxdtgg_FMnZanRt";

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function send(){
  let message = document.getElementById("msg").value;
  let user = document.getElementById("username").value;

  if(message=="" || user=="") return;

  await client
    .from("messages")
    .insert([{ text: user + ": " + message }]);

  document.getElementById("msg").value="";
}

async function load(){
  let { data } = await client
    .from("messages")
    .select("*");

  let html="";

  data.forEach(m=>{
    html += "<div style='background:#dcf8c6;padding:8px;margin:5px;border-radius:12px;max-width:75%;'>"+m.text+"</div>";
  });

  document.getElementById("messages").innerHTML = html;

  document.getElementById("messages").scrollTop =
  document.getElementById("messages").scrollHeight;
}

setInterval(load,1000);

</script>

</body>
</html>
