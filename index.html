<!DOCTYPE html>
<html>
<head>
<title>My Chat</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
}

#messages {
  height: 80vh;
  overflow-y: scroll;
  padding: 10px;
  background: #f0f0f0;
}

input {
  width: 90%;
  padding: 10px;
  margin: 5px;
}

button {
  padding: 10px;
  width: 95%;
}
</style>

</head>

<body>

<h2 style="text-align:center;">Online Chat</h2>

<div id="messages"></div>

<div style="position:fixed; bottom:0; width:100%; background:white; padding:10px;">
  
  <input id="username" placeholder="Enter your name">
  <input id="msg" placeholder="Type message">
  
  <button onclick="send()">Send</button>

</div>

<script>

const supabaseUrl = "https://mwogkqpseyajukoczujs.supabase.co";
const supabaseKey = "sb_publishable_xXJ29epOc0VbpKhDWxdtgg_FMnZanRt";

const client = supabase.createClient(supabaseUrl, supabaseKey);

async function send(){
  let message = document.getElementById("msg").value;
  let user = document.getElementById("username").value;

  if(message=="" || user=="") return;

  await client
    .from("messages")
    .insert([{ text: user + ": " + message }]);

  document.getElementById("msg").value="";
}

async function load(){
  let { data } = await client
    .from("messages")
    .select("*");

  let html="";

  data.forEach(m=>{
    html += "<div style='background:#dcf8c6;padding:10px;margin:5px;border-radius:15px;max-width:70%;'>"+m.text+"</div>";
  });

  document.getElementById("messages").innerHTML = html;

  document.getElementById("messages").scrollTop =
  document.getElementById("messages").scrollHeight;
}

setInterval(load,1000);

</script>

</body>
</html>
